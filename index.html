<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, height=720, initial-scale=1.0">
    <title>Ayatara Resort - Premium IPTV</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* =========================================
           CSS: STYLING & ANIMATION
           ========================================= */
        :root {
            --gold: #C6A46C;
            --gold-bright: #e9d1a1;
            --dark-bg: rgba(10, 10, 10, 0.85);
            --transition-smooth: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        body {
            margin: 0; padding: 0;
            width: 1280px; height: 720px;
            overflow: hidden; background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: #fff;
        }

        /* BACKGROUND VIDEO & OVERLAY */
        .bg-video {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover; z-index: -3;
        }

        .bg-overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 30% 50%, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.9) 100%);
            z-index: -1;
        }

        /* EFEK DEBU EMAS (PARTICLES) */
        .gold-particles {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.35;
            z-index: -2;
            animation: moveParticles 60s linear infinite;
        }

        @keyframes moveParticles {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        /* LAYOUT UTAMA */
        .container {
            width: 100%; height: 100%;
            padding: 60px; box-sizing: border-box;
            display: flex; flex-direction: column;
            transition: opacity 0.5s ease;
        }

        .header { margin-bottom: 40px; }
        .brand-title {
            font-size: 48px; font-weight: 300;
            letter-spacing: 15px; color: var(--gold);
            margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }
        .brand-subtitle {
            font-size: 18px; letter-spacing: 8px;
            margin: 5px 0 0 0; color: #aaa;
        }

        .content-wrapper { 
            display: flex; justify-content: space-between; 
            align-items: flex-end; height: 100%; 
        }

        /* GRID MENU */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 260px); 
            gap: 20px; 
            margin-bottom: 20px;
        }

        .card {
            height: 120px;
            background: var(--dark-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: var(--transition-smooth);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .card i { 
            font-size: 36px; color: #fff; 
            margin-bottom: 12px; transition: var(--transition-smooth); 
        }
        .card span { font-size: 18px; font-weight: 400; letter-spacing: 1px; }

        /* FOCUS STATE (EFEK HOVER/REMOTE) */
        .card.focus {
            transform: scale(1.1);
            border-color: var(--gold);
            background: rgba(198, 164, 108, 0.15);
            box-shadow: 0 0 30px rgba(198, 164, 108, 0.5);
            z-index: 10;
        }
        .card.focus i { color: var(--gold); transform: translateY(-3px); }
        .card.focus span { color: var(--gold-bright); font-weight: 600; }

        /* MINI PLAYER KANAN BAWAH */
        .preview-side { margin-bottom: 20px; }
        .mini-player-container {
            width: 480px; height: 270px;
            border-radius: 16px; overflow: hidden;
            border: 2px solid var(--gold);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: relative; background: #000;
        }
        #miniPlayer { width: 100%; height: 100%; object-fit: cover; }
        .mini-player-overlay {
            position: absolute; bottom: 0; width: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 20px 15px 10px 15px; box-sizing: border-box;
            text-align: center; color: var(--gold); font-size: 18px; font-weight: 500;
        }
    </style>
</head>
<body>

    <video autoplay muted loop class="bg-video">
        <source src="assets/bg_resort.mp4" type="video/mp4">
    </video>
    <div class="gold-particles"></div>
    <div class="bg-overlay"></div>

    <div class="container" id="mainContainer">
        <div class="header">
            <h1 class="brand-title">AYATARA</h1>
            <p class="brand-subtitle">RESORT</p>
        </div>

        <div class="content-wrapper">
            <div class="grid" id="grid">
                </div>

            <div class="preview-side">
                <div class="mini-player-container">
                    <video id="miniPlayer" muted loop autoplay></video>
                    <div class="mini-player-overlay">
                        <span id="miniPlayerTitle">Welcome to Ayatara</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* =========================================
           JAVASCRIPT: DATA & LOGIC
           ========================================= */
        
        // 1. DATA MENU
        const menuItems = [
            { id: "yt", name: "YouTube", icon: "fa-brands fa-youtube", type: "app", appId: "youtube.leanback.v4", preview: "assets/previews/youtube.mp4" },
            { id: "nf", name: "Netflix", icon: "fa-solid fa-n", type: "app", appId: "netflix", preview: "assets/previews/netflix.mp4" },
            { id: "dining", name: "Dining", icon: "fa-solid fa-utensils", type: "link", url: "https://ayatararesort.com/dining-experience/", preview: "assets/promo-dining.jpg" },
            { id: "hotel_info", name: "Hotel Info", icon: "fa-solid fa-circle-info", type: "link", url: "hotel.html", preview: "assets/previews/hotel.mp4" },
            { id: "room_info", name: "Room Service", icon: "fa-solid fa-bed", type: "link", url: "https://ayatararesort.com/accommodations/", preview: "assets/promo-pool.jpg" },
            { id: "tv", name: "Live TV", icon: "fa-solid fa-tv", type: "link", url: "tv.html", preview: "assets/previews/tv_promo.mp4" }
        ];

        let elements = [];
        let current;
        let previewTimeout;

        // 2. BUILD UI
        function buildGrid() {
            const grid = document.getElementById("grid");
            menuItems.forEach(item => {
                let div = document.createElement("div");
                div.className = "card";
                div.setAttribute("data-nav", "");
                div.innerHTML = `<i class="${item.icon}"></i><span>${item.name}</span>`;
                
                // Simpan data untuk navigasi
                div.dataset.preview = item.preview;
                div.dataset.type = item.type;
                div.dataset.name = item.name;
                if(item.appId) div.dataset.appId = item.appId;
                if(item.url) div.dataset.url = item.url;

                grid.appendChild(div);
            });
        }

        // 3. SMART SPATIAL NAVIGATION
        function initNav() {
            elements = Array.from(document.querySelectorAll("[data-nav]"));
            if(elements.length > 0) {
                setFocus(elements[0]);
            }
        }

        function setFocus(el) {
            if(current) current.classList.remove("focus");
            el.classList.add("focus");
            current = el;

            // Update Mini Player dengan Delay (Mencegah lag)
            clearTimeout(previewTimeout);
            const miniPlayer = document.getElementById("miniPlayer");
            const miniPlayerTitle = document.getElementById("miniPlayerTitle");

            if(current.dataset.preview) {
                previewTimeout = setTimeout(() => {
                    miniPlayer.src = current.dataset.preview;
                    miniPlayer.play().catch(e => console.log("Menunggu interaksi user..."));
                    miniPlayerTitle.innerText = "Preview: " + current.dataset.name;
                }, 300);
            }
        }

        function getCenter(el) {
            const r = el.getBoundingClientRect();
            return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
        }

        function findNext(dir) {
            const currentPos = getCenter(current);
            let candidates = elements.filter(el => {
                if(el === current) return false;
                const pos = getCenter(el);
                if (dir === "right") return pos.x > currentPos.x + 10;
                if (dir === "left") return pos.x < currentPos.x - 10;
                if (dir === "down") return pos.y > currentPos.y + 10;
                if (dir === "up") return pos.y < currentPos.y - 10;
                return false;
            });

            if (candidates.length === 0) return;

            let nearest = candidates.reduce((prev, el) => {
                const p1 = getCenter(prev);
                const p2 = getCenter(el);
                const d1 = Math.hypot(p1.x - currentPos.x, p1.y - currentPos.y);
                const d2 = Math.hypot(p2.x - currentPos.x, p2.y - currentPos.y);
                return d2 < d1 ? el : prev;
            });

            setFocus(nearest);
        }

        // 4. EKSEKUSI MENU (ENTER)
        function executeAction(el) {
            const type = el.dataset.type;
            
            if(type === "app") {
                console.log("Memanggil API TV untuk buka App: " + el.dataset.appId);
                // Jika di test di browser biasa, beri alert.
                // Jika di TV WebOS, gunakan: window.PalmSystem.launchApp(el.dataset.appId);
                alert("Membuka aplikasi: " + el.dataset.name);
            } else if(type === "link") {
                document.getElementById("mainContainer").style.opacity = "0";
                setTimeout(() => window.location.href = el.dataset.url, 500);
            }
        }

        // 5. EVENT LISTENER REMOTE TV
        document.addEventListener("keydown", e => {
            switch (e.key) {
                case "ArrowRight": findNext("right"); break;
                case "ArrowLeft": findNext("left"); break;
                case "ArrowDown": findNext("down"); break;
                case "ArrowUp": findNext("up"); break;
                case "Enter": executeAction(current); break;
            }
        });

        // 6. MULAI SISTEM
        window.onload = () => {
            buildGrid();
            initNav();
        };
    </script>
</body>
</html>
