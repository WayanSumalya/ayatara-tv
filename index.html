<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, height=720, user-scalable=no">
    <title>Ayatara - Luxury HD Portal</title>
    <style>
        :root { --gold: #d4af37; --glass: rgba(0, 0, 0, 0.85); }
        body, html { margin: 0; padding: 0; width: 1280px; height: 720px; overflow: hidden; background: #000; font-family: Arial, sans-serif; color: #fff; }

        /* 1. Dust Effect Canvas */
        #dust-canvas { position: absolute; top: 0; left: 0; width: 1280px; height: 720px; z-index: 3; pointer-events: none; opacity: 0.5; }

        /* 2. Background Slider & MOTION EFFECT (DIKEMBALIKAN) */
        #bg-slider { position: absolute; width: 1280px; height: 720px; z-index: 1; overflow: hidden; }
        .promo-slide { position: absolute; width: 1280px; height: 720px; opacity: 0; visibility: hidden; transition: opacity 2s ease-in-out; } /* Efek Crossfade 2 detik */
        .promo-slide.active { opacity: 1; visibility: visible; }
        .promo-img { width: 100%; height: 100%; object-fit: cover; }
        
        .overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.2) 60%, rgba(0,0,0,0.7) 100%);
            z-index: 2;
        }

        /* 3. Header */
        header { 
            position: absolute; top: 35px; left: 60px; right: 60px; 
            display: flex; justify-content: space-between; align-items: flex-start; z-index: 10; 
        }
        .guest-info h1 { font-size: 34px; margin: 0; font-weight: 200; letter-spacing: 1px; }
        .guest-info span { color: var(--gold); font-weight: 700; }
        .room-tag { font-size: 16px; letter-spacing: 4px; opacity: 0.6; text-transform: uppercase; margin-bottom: 5px; }

        #clock { font-size: 60px; font-weight: 700; line-height: 1; text-align: right; margin-bottom: 5px; }
        #date { font-size: 16px; opacity: 0.8; text-align: right; text-transform: uppercase; letter-spacing: 1px; }

        /* 4. Navigation Dock (Fixed Icons & Focus) */
        .nav-dock {
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 20px; padding: 15px 40px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            z-index: 20;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .nav-item {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-decoration: none; color: #fff; width: 100px;
            transition: 0.4s ease-out; opacity: 0.3;
        }

        .nav-item.focused { opacity: 1; transform: translateY(-15px); }

        /* Ikon SVG In-line (Mustahil Pecah/Hilang) */
        .icon-svg { width: 45px; height: 45px; margin-bottom: 10px; display: block; }
        
        .nav-item span { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; text-align: center; }
        .focused span { color: var(--gold); text-shadow: 0 0 10px rgba(212,175,55,0.5); }

        /* 5. Promo Content */
        .promo-content { position: absolute; bottom: 180px; left: 60px; z-index: 10; max-width: 600px; }
        .promo-title { font-size: 64px; font-weight: 800; margin: 0; color: #fff; text-shadow: 0 10px 30px rgba(0,0,0,0.6); }

    </style>
</head>
<body onload="initPortal()">

    <canvas id="dust-canvas"></canvas>

    <div id="bg-slider">
        <div class="promo-slide active" data-title="OCEAN DINING">
            <img src="assets/promo-dining.jpg" class="promo-img">
        </div>
        <div class="promo-slide" data-title="SPA LUXURY">
            <img src="assets/promo-spa.jpg" class="promo-img">
        </div>
    </div>

    <div class="overlay"></div>

    <header>
        <div class="guest-info">
            <div class="room-tag">VILLA 302</div>
            <h1>Welcome, <span>Mr. Sumalya</span></h1>
        </div>
        <div class="time-info">
            <div id="clock">00:00</div>
            <div id="date">Friday, 27 March 2026</div>
        </div>
    </header>

    <div class="promo-content">
        <h2 class="promo-title" id="p-title">OCEAN DINING</h2>
    </div>

    <nav class="nav-dock">
        <div class="nav-item focused" data-url="netflix://">
            <svg class="icon-svg" viewBox="0 0 24 24"><path fill="#E50914" d="M18.3 2.6H19.5V22.6H18.3L12.6 10.4L7.7 22.6H5.7V2.6H6.9L9.8 8.8L18.3 2.6Z"/></svg>
            <span>Netflix</span>
        </div>
        <div class="nav-item" data-url="youtube://">
            <svg class="icon-svg" viewBox="0 0 24 24"><path fill="#FF0000" d="M23.5 6.2c-.3-1-1.1-1.8-2.1-2.1C18.6 3.8 12 3.8 12 3.8s-6.6 0-9.4.3c-1 .3-1.8 1.1-2.1 2.1C.2 9 0 12 0 12s0 3 .2 5.8c.3 1 1.1 1.8 2.1 2.1 2.8.3 9.4.3 9.4.3s6.6 0 9.4-.3c1-.3 1.8-1.1 2.1-2.1.2-2.8.2-5.8.2-5.8s0-3-.2-5.8zM9.5 15.5V8.5l6.5 3.5-6.5 3.5z"/></svg>
            <span>YouTube</span>
        </div>
        <div class="nav-item" data-url="mirroring://">
            <svg class="icon-svg" viewBox="0 0 24 24"><path fill="#FFF" d="M17 3h-8v1h2v12H3V24s2 0 2 0h0v-1h12v1h0s2 0 2 0H17V5H13V3h3Z"/></svg>
            <span>Mirroring</span>
        </div>
        <div class="nav-item" data-url="dining://">
            <svg class="icon-svg" viewBox="0 0 24 24"><path fill="#FFF" d="M12 4h-5V2h2v4h3V2H8V4h2V2h1V4H8V2H9V4h1V2H10V4H8V2H9V3h1V2H9eM11 24h-2v-8H9Z"/></svg>
            <span>Dining</span>
        </div>
    </nav>

    <script>
        // --- 1. Particles (Dust) ---
        const canvas = document.getElementById('dust-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1280; canvas.height = 720;
        let particles = [];
        for(let i=0; i<60; i++) particles.push({x:Math.random()*1280, y:Math.random()*720, r:Math.random()*1.5, d:Math.random()*0.3+0.1});
        function drawParticles() {
            ctx.clearRect(0,0,1280,720); ctx.fillStyle="rgba(212,175,55,0.4)"; ctx.beginPath();
            particles.forEach(p => { ctx.moveTo(p.x, p.y); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); p.y-=p.d; if(p.y<0) p.y=720; });
            ctx.fill(); requestAnimationFrame(drawParticles);
        }
        drawParticles();

        // --- 2. Live Clock & Date ---
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('date').innerText = now.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'short'});
        }, 1000);

        // --- 3. AUTO SLIDER ENGINE (MOTION FIXED) ---
        let slides = document.querySelectorAll('.promo-slide');
        let currentIdx = 0;
        function showSlide(index) {
            let next = index;
            let currentS = document.querySelector('.promo-slide.active');
            let nextS = slides[next];
            
            // Animasi transisi gambar background
            currentS.classList.remove('active'); // Memicu transisi opacity CSS
            nextS.classList.add('active'); // Memicu transisi opacity CSS
            
            // Perbarui Teks Promo
            document.getElementById('p-title').innerText = nextS.dataset.title;
        }
        setInterval(() => {
            let next = (currentIdx + 1) % slides.length;
            showSlide(next);
            currentIdx = next;
        }, 8000); // Ganti slide setiap 8 detik
        // Initial title
        document.getElementById('p-title').innerText = slides[0].dataset.title;

        // --- 4. Remote Navigation Engine ---
        let items = document.querySelectorAll('.nav-item');
        let index = 0;

        window.addEventListener('keydown', (e) => {
            // TV Key Codes (Left: 37, Right: 39, OK: 13)
            if(e.keyCode == 37) { // Left
                items[index].classList.remove('focused');
                index = (index > 0) ? index - 1 : items.length - 1;
                items[index].classList.add('focused');
            } else if(e.keyCode == 39) { // Right
                items[index].classList.remove('focused');
                index = (index < items.length - 1) ? index + 1 : 0;
                items[index].classList.add('focused');
            } else if(e.keyCode == 13) { // OK / Enter
                alert("Opening " + items[index].querySelector('span').innerText);
            }
        });

        function initPortal() { window.focus(); }
    </script>
</body>
</html>
