<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, height=720, user-scalable=no">
    <title>Ayatara Luxury Portal</title>
    <style>
        :root { --gold: #d4af37; --glass: rgba(0, 0, 0, 0.85); }
        body, html { margin: 0; padding: 0; width: 1280px; height: 720px; overflow: hidden; background: #000; font-family: Arial, sans-serif; color: #fff; }

        /* Background */
        #dust-canvas { position: absolute; top: 0; left: 0; z-index: 3; pointer-events: none; }
        #bg-slider { position: absolute; width: 100%; height: 100%; z-index: 1; }
        .promo-slide { position: absolute; width: 100%; height: 100%; opacity: 0; visibility: hidden; transition: opacity 1.5s ease; }
        .promo-slide.active { opacity: 1; visibility: visible; }
        .promo-img { width: 100%; height: 100%; object-fit: cover; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, rgba(0,0,0,0.85) 0%, transparent 60%); z-index: 2; }

        /* Header */
        header { position: absolute; top: 40px; left: 60px; right: 60px; display: flex; justify-content: space-between; z-index: 10; }
        .guest h1 { font-size: 32px; margin: 0; font-weight: 200; }
        .guest span { color: var(--gold); font-weight: 700; }
        #clock { font-size: 50px; font-weight: 700; }

        .promo-content { position: absolute; bottom: 180px; left: 60px; z-index: 10; }
        #p-title { font-size: 60px; font-weight: 800; margin: 0; text-transform: uppercase; }

        /* Navigation Dock (RE-ENGINEERED) */
        .nav-dock { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 30px; padding: 20px 50px; background: var(--glass); border-radius: 60px; z-index: 20; border: 1px solid rgba(255,255,255,0.15); box-sizing: border-box; }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 110px; opacity: 0.3; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .nav-item.focused { opacity: 1; transform: translateY(-15px) scale(1.1); }
        
        /* Ikon SVG In-line (Mustahil Pecah/Hilang) */
        .icon-svg { width: 50px; height: 50px; margin-bottom: 10px; display: block; }
        .nav-item span { font-size: 13px; font-weight: 700; text-transform: uppercase; color: #fff; letter-spacing: 1px; }
        .focused span { color: var(--gold); }
    </style>
</head>
<body onload="initPortal()">
    <canvas id="dust-canvas"></canvas>
    <div id="bg-slider">
        <div class="promo-slide active" data-title="LUXURY DINING"><img src="assets/promo-dining.jpg" class="promo-img"></div>
        <div class="promo-slide" data-title="SPA LUXURY"><img src="assets/promo-spa.jpg" class="promo-img"></div>
        <div class="promo-slide" data-title="LUXURY POOL"><img src="assets/promo-pool.jpg" class="promo-img"></div>
    </div>
    <div class="overlay"></div>

    <header>
        <div class="guest"><h1>Welcome, <span>Mr. Sumalya</span></h1></div>
        <div id="clock">00:00</div>
    </header>

    <div class="promo-content"><h2 id="p-title">LUXURY DINING</h2></div>

    <nav class="nav-dock">
        <div class="nav-item focused" data-url="netflix://">
            <svg class="icon-svg" viewBox="0 0 24 24"><path fill="#E50914" d="M18.3 2.6H19.5V22.6H18.3L12.6 10.4L7.7 22.6H5.7V2.6H6.9L9.8 8.8L18.3 2.6Z"/></svg>
            <span>Netflix</span>
        </div>
        <div class="nav-item" data-url="youtube://">
            <svg class="icon-svg" viewBox="0 0 24 24"><path fill="#FF0000" d="M23.5 6.2c-.3-1-1.1-1.8-2.1-2.1C18.6 3.8 12 3.8 12 3.8s-6.6 0-9.4.3c-1 .3-1.8 1.1-2.1 2.1C.2 9 0 12 0 12s0 3 .2 5.8c.3 1 1.1 1.8 2.1 2.1 2.8.3 9.4.3 9.4.3s6.6 0 9.4-.3c1-.3 1.8-1.1 2.1-2.1.2-2.8.2-5.8.2-5.8s0-3-.2-5.8zM9.5 15.5V8.5l6.5 3.5-6.5 3.5z"/></svg>
            <span>YouTube</span>
        </div>
        <div class="nav-item" data-url="Channel List">
            <svg class="icon-svg" viewBox="0 0 24 24"><path fill="#FFF" d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h4v2h8v-2h4c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14H3V5h18v12zM8 8l8 4-8 4V8z"/></svg>
            <span>Channels</span>
        </div>
        <div class="nav-item" data-url="Hotel Info 1">
            <svg class="icon-svg" viewBox="0 0 24 24"><path fill="#FFF" d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
            <span>Information</span>
        </div>
    </nav>

    <script>
        // --- Clock ---
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'}); }, 1000);

        // --- Dust Particles ---
        const canvas = document.getElementById('dust-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1280; canvas.height = 720;
        let particles = [];
        for(let i=0; i<60; i++) particles.push({x:Math.random()*1280, y:Math.random()*720, r:Math.random()*1.5, d:Math.random()*0.3});
        function draw() {
            ctx.clearRect(0,0,1280,720); ctx.fillStyle="rgba(212,175,55,0.4)"; ctx.beginPath();
            particles.forEach(p => { ctx.moveTo(p.x, p.y); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); p.y-=p.d; if(p.y<0) p.y=720; });
            ctx.fill(); requestAnimationFrame(draw);
        }
        draw();

        // --- Navigation (Sangat Penting untuk LG) ---
        let items = document.querySelectorAll('.nav-item');
        let idx = 0;

        window.addEventListener('keydown', (e) => {
            // Logika Gerak Kiri-Kanan
            if(e.keyCode == 37 && idx > 0) { // Left
                items[idx].classList.remove('focused'); idx--; items[idx].classList.add('focused');
            } else if(e.keyCode == 39 && idx < items.length - 1) { // Right
                items[idx].classList.remove('focused'); idx++; items[idx].classList.add('focused');
            } 
            // Logika OK (Pindah Page)
            else if(e.keyCode == 13) {
                let url = items[idx].getAttribute('data-url');
                if(url.includes('://')) {
                    window.location.href = url; // App Launch
                } else {
                    // Berpindah halaman internal PCD (Keluar dari Iframe)
                    window.parent.location.href = "index.html?page=" + encodeURIComponent(url);
                }
            }
        });

        // --- Slider ---
        let slides = document.querySelectorAll('.promo-slide');
        let sIdx = 0;
        setInterval(() => {
            slides[sIdx].classList.remove('active');
            sIdx = (sIdx + 1) % slides.length;
            slides[sIdx].classList.add('active');
            document.getElementById('p-title').innerText = slides[sIdx].dataset.title;
        }, 8000);

        function initPortal() { window.focus(); }
    </script>
</body>
</html>
