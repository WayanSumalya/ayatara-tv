<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, height=720, user-scalable=no">
    <title>Ayatara Resort - HD Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --gold: #d4af37;
            --glass: rgba(0, 0, 0, 0.6);
        }

        body, html {
            margin: 0; padding: 0;
            width: 1280px; height: 720px; /* Locked to HD */
            overflow: hidden; background: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #fff;
        }

        /* Particles HD */
        #particle-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 3;
            pointer-events: none; opacity: 0.3;
        }

        /* Background Slider */
        #bg-slider { position: absolute; width: 100%; height: 100%; z-index: 1; }
        .promo-slide { position: absolute; width: 100%; height: 100%; opacity: 0; visibility: hidden; }
        .promo-slide.active { opacity: 1; visibility: visible; }
        .promo-img { width: 100%; height: 100%; object-fit: cover; }
        
        .overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.2) 60%);
            z-index: 2;
        }

        /* Header Info - Ukuran Font Diperkecil untuk HD */
        header {
            position: absolute; top: 40px; left: 60px; right: 60px;
            display: flex; justify-content: space-between; z-index: 10;
        }
        .guest-info h1 { font-size: 38px; margin: 0; font-weight: 200; }
        .guest-info span { color: var(--gold); font-weight: 600; }
        .room-tag { font-size: 16px; letter-spacing: 3px; opacity: 0.6; }

        #clock { font-size: 56px; font-weight: 700; line-height: 1; text-align: right; }
        #date { font-size: 16px; opacity: 0.7; text-align: right; }

        /* Navigation Dock - Skala HD */
        .nav-dock {
            position: absolute; bottom: 50px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 20px; padding: 15px 35px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            z-index: 20;
        }

        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; color: #fff; width: 90px;
            transition: all 0.4s ease; opacity: 0.6;
        }

        .nav-item.focused { opacity: 1; transform: translateY(-10px) scale(1.1); }

        .icon-box { width: 45px; height: 45px; background-size: contain; background-repeat: no-repeat; margin-bottom: 8px; }

        .nav-item span { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .nav-item.focused span { color: var(--gold); }

        /* Promo Text HD */
        .promo-content { position: absolute; bottom: 180px; left: 60px; z-index: 10; max-width: 600px; }
        .promo-title { font-size: 54px; font-weight: 800; margin: 0; line-height: 1; }
        .promo-desc { font-size: 20px; margin-top: 10px; color: var(--gold); }

        /* Icons */
        .ic-netflix { background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCI+PHBhdGggZD0iTTE4LjMgMi42SDE5LjVWMjIuNkgxOC4zTDEyLjYgMTAuNEw3LjcgMjIuNkg1LjdWMi42SDYuOUw5LjggOC44TDE4LjMgMi42WiIgZmlsbD0iI0UxMDYxMyIvPjwvc3ZnPg=='); }
        .ic-youtube { background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCI+PHBhdGggZD0iTTIzLjQ5OCA2LjE4NmMtLjI3Mi0xLjAyMi0xLjA3NC0xLjgyNC0yLjA5Ni0yLjA5NkMxOC41NiA0IDEyIDQgMTIgNHMtNi41NiAwLTkuNDAyLjA5QzEuNTc2IDQuMzYyLjI3IDYuMTg2IDAgOC4yODMgMCAxMiAwIDE1LjcxNy4yIDguMjgzYzAgMTIuODggMCAxOC4yMDctMS4wOTYgMi4wOTYtMi4wOTYgMi44MzhMMTIgMjBzOS40MDItLjA5IDkuNDAyLS4wOUMxOS41NzcgMTUuNjc4IDE5LjE2OCAxNC4xOTggMTguOTY1IDEyLjUyNSAxOC45NjUgMTAuODQ3IDE5LjAxNSA4LjU3MSAxOC44MzEgNi4xODZaTTEwIDE0LjVWOS41TDE0LjUgMTJMMTAgMTQuNVoiIGZpbGw9IiNmZjAwMDAiLz48L3N2Zz4='); }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div id="bg-slider">
        <div class="promo-slide active" data-title="SUNSET DINNER" data-desc="Diskon 20% untuk Seafood Platter.">
            <img src="https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?q=80&w=1280" class="promo-img">
        </div>
        <div class="promo-slide" data-title="SPA LUXURY" data-desc="Relaksasi total dengan terapis Bali.">
            <img src="https://images.unsplash.com/photo-1544161515-4af6b1d462c2?q=80&w=1280" class="promo-img">
        </div>
    </div>

    <div class="overlay"></div>

    <header>
        <div class="guest-info">
            <div class="room-tag">VILLA 302</div>
            <h1>Welcome, <span>Mr. Sumalya</span></h1>
        </div>
        <div class="time-info">
            <div id="clock">00:00</div>
            <div id="date">Friday, 27 March 2026</div>
        </div>
    </header>

    <div class="promo-content">
        <h2 class="promo-title" id="p-title">AYATARA</h2>
        <p class="promo-desc" id="p-desc">Resort & Spa</p>
    </div>

    <nav class="nav-dock">
        <div class="nav-item focused"><div class="icon-box ic-netflix"></div><span>Netflix</span></div>
        <div class="nav-item"><div class="icon-box ic-youtube"></div><span>YouTube</span></div>
        <div class="nav-item"><div class="icon-box" style="background-image:url('https://cdn-icons-png.flaticon.com/512/916/916771.png')"></div><span>Mirror</span></div>
        <div class="nav-item"><div class="icon-box" style="background-image:url('https://cdn-icons-png.flaticon.com/512/3003/3003984.png')"></div><span>Dining</span></div>
        <div class="nav-item"><div class="icon-box" style="background-image:url('https://cdn-icons-png.flaticon.com/512/3161/3161158.png')"></div><span>TV</span></div>
    </nav>

    <script>
        // Logika Slider & Clock tetap sama, hanya ukuran font yang berubah di CSS
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('date').innerText = now.toLocaleDateString('en-GB', {day:'numeric', month:'short', year:'numeric'});
        }
        setInterval(updateClock, 1000); updateClock();

        let slides = document.querySelectorAll('.promo-slide');
        let current = 0;
        setInterval(() => {
            let next = (current + 1) % slides.length;
            gsap.to(slides[current], {opacity:0, duration:1});
            gsap.to(slides[next], {opacity:1, visibility:'visible', duration:1});
            document.getElementById('p-title').innerText = slides[next].dataset.title;
            document.getElementById('p-desc').innerText = slides[next].dataset.desc;
            current = next;
        }, 8000);

        // Remote Navigation HD
        let navItems = document.querySelectorAll('.nav-item');
        let focusedIdx = 0;
        window.addEventListener('keydown', (e) => {
            if(e.keyCode == 37 && focusedIdx > 0) { // Left
                navItems[focusedIdx].classList.remove('focused');
                focusedIdx--;
                navItems[focusedIdx].classList.add('focused');
            } else if(e.keyCode == 39 && focusedIdx < navItems.length - 1) { // Right
                navItems[focusedIdx].classList.remove('focused');
                focusedIdx++;
                navItems[focusedIdx].classList.add('focused');
            }
        });
    </script>
</body>
</html>
