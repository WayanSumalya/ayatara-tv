<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LG Pro:Centric Remote Test</title>
<style>
    body {
        margin: 0;
        background: #111;
        color: #fff;
        font-family: Arial, sans-serif;
        overflow: hidden;
    }

    .container {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        padding: 50px;
    }

    .btn {
        background: #333;
        padding: 40px;
        text-align: center;
        border-radius: 10px;
        font-size: 20px;
        transition: 0.2s;
    }

    .btn.active {
        background: #00c853;
        transform: scale(1.1);
    }

    .debug {
        position: fixed;
        bottom: 10px;
        left: 10px;
        font-size: 18px;
        color: #0f0;
    }
</style>
</head>

<body tabindex="0">

<div class="container" id="grid">
    <div class="btn active">Button 1</div>
    <div class="btn">Button 2</div>
    <div class="btn">Button 3</div>
    <div class="btn">Button 4</div>
    <div class="btn">Button 5</div>
    <div class="btn">Button 6</div>
    <div class="btn">Button 7</div>
    <div class="btn">Button 8</div>
</div>

<div class="debug" id="debug">Key: -</div>

<script>
let buttons = document.querySelectorAll('.btn');
let currentIndex = 0;

document.body.focus();

// Update active button
function updateFocus() {
    buttons.forEach(btn => btn.classList.remove('active'));
    buttons[currentIndex].classList.add('active');
}

// Handle remote key
document.addEventListener('keydown', function(e) {

    document.getElementById("debug").innerText = "Key: " + e.keyCode;

    switch (e.keyCode) {

        case 37: // LEFT
            if (currentIndex % 4 !== 0) currentIndex--;
            break;

        case 38: // UP
            if (currentIndex - 4 >= 0) currentIndex -= 4;
            break;

        case 39: // RIGHT
            if (currentIndex % 4 !== 3) currentIndex++;
            break;

        case 40: // DOWN
            if (currentIndex + 4 < buttons.length) currentIndex += 4;
            break;

        case 13: // OK
            alert("Klik: " + buttons[currentIndex].innerText);
            break;

        case 461: // BACK (LG)
            alert("BACK pressed");
            break;

        default:
            console.log("Key:", e.keyCode);
    }

    updateFocus();
});

// Initial focus
updateFocus();
</script>

</body>
</html><body>

    <div class="main-bg"></div>

    <div class="container">
        <h1 class="logo-text">AYATARA</h1>
        <div class="subtitle">RESORT & SPA</div>

        <div class="menu-grid">
            <div class="nav-box" data-url="hotel-info.html">
                <i class="fas fa-info-circle"></i>
                <span>Hotel Info</span>
            </div>
            <div class="nav-box" data-url="rooms.html">
                <i class="fas fa-bed"></i>
                <span>Rooms</span>
            </div>
            <div class="nav-box" data-url="dining.html">
                <i class="fas fa-utensils"></i>
                <span>Dining</span>
            </div>
            <div class="nav-box" data-url="livetv.html">
                <i class="fas fa-tv"></i>
                <span>Live TV</span>
            </div>
            <div class="nav-box" data-url="https://www.youtube.com/tv">
                <i class="fab fa-youtube"></i>
                <span>YouTube</span>
            </div>
            <div class="nav-box" data-url="https://www.netflix.com">
                <i class="fas fa-film"></i>
                <span>Netflix</span>
            </div>
        </div>
    </div>

    <script>
        // Logika Remote Control Khusus TV
        const items = document.querySelectorAll('.nav-box');
        let currentIndex = 0;
        const columns = 3; // Karena kita pakai 3 kolom

        function updateFocus(newIndex) {
            // Hapus efek dari menu sebelumnya
            items[currentIndex].classList.remove('active');
            
            // Pindah ke menu baru
            currentIndex = newIndex;
            
            // Berikan efek ke menu baru
            items[currentIndex].classList.add('active');
        }

        document.addEventListener('keydown', function(e) {
            switch(e.keyCode) {
                case 37: // Panah KIRI
                    if (currentIndex % columns !== 0) {
                        updateFocus(currentIndex - 1);
                    }
                    break;
                case 39: // Panah KANAN
                    if ((currentIndex + 1) % columns !== 0 && currentIndex < items.length - 1) {
                        updateFocus(currentIndex + 1);
                    }
                    break;
                case 38: // Panah ATAS
                    if (currentIndex >= columns) {
                        updateFocus(currentIndex - columns);
                    }
                    break;
                case 40: // Panah BAWAH
                    if (currentIndex + columns < items.length) {
                        updateFocus(currentIndex + columns);
                    }
                    break;
                case 13: // Tombol OK / ENTER
                    const targetUrl = items[currentIndex].getAttribute('data-url');
                    // Jika URL valid, alihkan halaman
                    if(targetUrl) {
                        window.location.href = targetUrl;
                    }
                    break;
            }
        });

        // Pastikan menu pertama langsung terpilih (fokus) saat halaman selesai dimuat
        window.onload = function() {
            items[0].classList.add('active');
        };
    </script>
</body>
</html>
