<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<style>
    /* Reset & Full Screen Lock */
    * { margin:0; padding:0; box-sizing:border-box; overflow:hidden; }
    body, html { width:1920px; height:1080px; background:#000; color:#fff; font-family:'Segoe UI',Arial,sans-serif; }

    /* Background Smooth Slider */
    .bg-layer {
        position:absolute; width:100%; height:100%; z-index:1;
        background-size:cover; background-position:center;
        transition: opacity 1.5s ease-in-out;
        background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.7));
    }

    /* Header & Info */
    header {
        position:absolute; top:60px; left:80px; right:80px;
        display:flex; justify-content:space-between; z-index:10;
    }
    .logo img { height:90px; filter: drop-shadow(2px 2px 10px rgba(0,0,0,0.5)); }
    .info-bar { text-align:right; }
    #clock { font-size:80px; font-weight:200; line-height:1; }
    #date { font-size:24px; color:#D4AF37; letter-spacing:2px; text-transform:uppercase; }

    /* Welcome Message */
    .welcome { position:absolute; top:380px; left:80px; z-index:10; }
    .welcome h2 { font-size:30px; font-weight:300; letter-spacing:5px; text-transform:uppercase; margin-bottom:10px; }
    .welcome h1 { font-size:100px; color:#D4AF37; margin-bottom:15px; text-shadow: 3px 3px 20px rgba(0,0,0,0.8); }
    .room-tag { font-size:24px; padding:10px 20px; background:rgba(212,175,55,0.2); border-left:5px solid #D4AF37; display:inline-block; }

    /* Modern Grid Menu */
    nav {
        position:absolute; bottom:80px; left:80px; right:80px;
        display:grid; grid-template-columns: repeat(6, 1fr); gap:20px; z-index:10;
    }
    .item {
        background:rgba(255,255,255,0.08); backdrop-filter:blur(15px); -webkit-backdrop-filter:blur(15px);
        height:200px; border:1px solid rgba(255,255,255,0.15);
        display:flex; flex-direction:column; justify-content:center; align-items:center;
        transition:all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor:pointer;
    }
    .item:focus, .item.active {
        background:#D4AF37; transform:scale(1.08) translateY(-10px); 
        border:3px solid #fff; box-shadow:0 15px 30px rgba(0,0,0,0.5); outline:none;
    }
    .item span { font-size:20px; font-weight:600; text-transform:uppercase; letter-spacing:1px; margin-top:15px; }

    /* Icon Placeholder (Anda bisa ganti dengan SVG atau Icon Font) */
    .icon { width:50px; height:50px; border:2px solid currentColor; border-radius:10px; opacity:0.8; }
</style>
</head>
<body onload='startApp()'>

<div class='bg-layer' id='bg1' style='opacity:1;'></div>
<div class='bg-layer' id='bg2' style='opacity:0;'></div>

<header>
    <div class='logo'><img src='http://10.10.0.2/project/AYATARA/LOGO/logo.png' onerror='this.style.display="none"'></div>
    <div class='info-bar'>
        <div id='clock'>00:00</div>
        <div id='date'>Loading...</div>
    </div>
</header>

<div class='welcome'>
    <h2>Welcome to Ayatara Resort</h2>
    <h1 id='guest'>Mr. Wayan Sumalya</h1>
    <div class='room-tag'>SUITE ROOM <span id='room'>402</span></div>
</div>

<nav id='menu'>
    <div class='item' tabindex='1'> <div class='icon'></div> <span>TV Channels</span> </div>
    <div class='item' tabindex='2'> <div class='icon'></div> <span>YouTube</span> </div>
    <div class='item' tabindex='3'> <div class='icon'></div> <span>Netflix</span> </div>
    <div class='item' tabindex='4'> <div class='icon'></div> <span>Dining</span> </div>
    <div class='item' tabindex='5'> <div class='icon'></div> <span>Facilities</span> </div>
    <div class='item' tabindex='6'> <div class='icon'></div> <span>Hotel Info</span> </div>
</nav>

<script>
    const images = [
        'http://10.10.0.2/project/AYATARA/KAMAR/AKPBedroom.jpg',
        'http://10.10.0.2/project/AYATARA/KAMAR/AKPPool.jpg',
        'http://10.10.0.2/project/AYATARA/KAMAR/AKSBalcony.jpg'
    ];
    
    let currentIdx = 0;
    let bgToggle = true;

    function updateTime() {
        const n = new Date();
        document.getElementById('clock').innerHTML = n.getHours().toString().padStart(2,'0') + ':' + n.getMinutes().toString().padStart(2,'0');
        const options = { weekday: 'long', day: 'numeric', month: 'long' };
        document.getElementById('date').innerHTML = n.toLocaleDateString('en-US', options);
    }

    function changeBg() {
        const nextImg = images[currentIdx];
        const activeLayer = bgToggle ? document.getElementById('bg1') : document.getElementById('bg2');
        const idleLayer = bgToggle ? document.getElementById('bg2') : document.getElementById('bg1');
        
        idleLayer.style.backgroundImage = "linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.7)), url('" + nextImg + "')";
        idleLayer.style.opacity = 1;
        activeLayer.style.opacity = 0;
        
        bgToggle = !bgToggle;
        currentIdx = (currentIdx + 1) % images.length;
    }

    function startApp() {
        updateTime();
        setInterval(updateTime, 1000);
        setInterval(changeBg, 10000);
        changeBg();
        
        // Auto-focus ke menu pertama agar Remote langsung aktif
        document.querySelector('.item').focus();
    }

    // Navigasi Remote TV (Arrow Keys)
    document.addEventListener('keydown', function(e) {
        const current = document.activeElement;
        if (e.keyCode == 39) { // Right
            if (current.nextElementSibling) current.nextElementSibling.focus();
        } else if (e.keyCode == 37) { // Left
            if (current.previousElementSibling) current.previousElementSibling.focus();
        } else if (e.keyCode == 13) { // Enter
            alert('Opening: ' + current.innerText);
        }
    });
</script>

</body>
</html>
