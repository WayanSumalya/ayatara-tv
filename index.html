<title>Ayatara Resort — In-Room Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root {
  --bg-deep:    #080f0d;
  --bg-card:    #111f19;
  --bg-hover:   #1a2f24;
  --gold:       #c9a96e;
  --gold-light: #e8cfa0;
  --gold-dark:  #8a6d3b;
  --cream:      #f0e9d8;
  --muted:      #b0a086;
  --border:     rgba(201,169,110,0.2);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{ width:1280px;height:720px;overflow:hidden; background:var(--bg-deep); font-family:'Lato',sans-serif;color:var(--cream); user-select:none; }

/* ══ PAGE SYSTEM ══ */
.page{display:none;position:absolute;inset:0;flex-direction:column;animation:pgIn .4s ease both;}
.page.active{display:flex;}
@keyframes pgIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* ══ NAVIGATION FOCUS ══ */
.nav-item{ transition: all .22s ease; outline:none; border: 1px solid transparent; }
.nav-item.tv-focus{
  border-color:var(--gold)!important;
  transform: scale(1.02)!important;
  background:var(--bg-hover)!important;
  box-shadow:0 15px 40px rgba(0,0,0,0.7), 0 0 20px rgba(201,169,110,0.2)!important;
}

/* ══ HEADER ══ */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:24px 64px 18px; border-bottom:1px solid var(--border);
  background:linear-gradient(180deg,rgba(8,15,13,.98) 0%,rgba(8,15,13,.75) 100%);
}
.logo-name{font-family:'Cinzel',serif;font-size:26px;letter-spacing:7px;color:var(--gold-light);}
.hdr-time{font-family:'Cinzel',serif;font-size:38px;color:var(--gold-light);}

/* ══ HOME GRID ══ */
.menu-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:18px; padding:20px 52px; flex:1; }
.menu-card{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border:1px solid var(--border);border-radius:4px;
  background:var(--bg-card); min-height:216px;
}
.card-icon{ width:66px; height:66px; margin-bottom:20px; position:relative; display:flex; align-items:center; justify-content:center; }
.card-icon-ring{ position:absolute; inset:0; border-radius:50%; border:1px solid var(--border); }
.card-label{font-family:'Cinzel',serif;font-size:11.5px;letter-spacing:2.5px;text-align:center;text-transform:uppercase;}

/* ══ LIVE TV GRID (45 Channels) ══ */
.tv-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
  overflow-y: auto; padding: 10px 64px; height: 100%;
}
.ch-card {
  border: 1px solid var(--border); background: var(--bg-card);
  padding: 15px 20px; display: flex; align-items: center; gap: 20px; border-radius: 4px;
}
.ch-num { font-family: 'Cinzel', serif; font-size: 20px; color: var(--gold-dark); min-width: 40px; }
.ch-logo-wrap { width: 60px; height: 40px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border-radius: 4px; padding: 5px; }
.ch-logo-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; }
.ch-name { font-family: 'Cinzel', serif; font-size: 13px; color: var(--cream); letter-spacing: 1px; }

/* ══ MODAL ══ */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;align-items:center;justify-content:center;}
.modal.active{display:flex;}
.modal-box{background:var(--bg-card); border:1px solid var(--gold); padding:50px; text-align:center; width:640px; border-radius:8px;}
.m-btns{display:flex; gap:16px; justify-content:center; margin-top:30px;}
.stream-btn{ font-family:'Cinzel',serif; padding:14px 34px; border:1px solid var(--gold); background:none; color:white; cursor:pointer; }
.stream-btn.tv-focus { background: var(--gold); color: #000; font-weight: bold; }

/* ══ LOADING ══ */
#loading{ position:fixed; inset:0; z-index:300; background:var(--bg-deep); display:flex; flex-direction:column; align-items:center; justify-content:center; }
#loading.gone{ opacity:0; pointer-events:none; transition: opacity .9s; }

.sub-body{ flex:1; overflow:hidden; padding:0 0 26px 0; }
.btn-back{ border:1px solid var(--border); padding:10px 24px; font-family:'Cinzel'; cursor:pointer; margin-right: 64px; }
::-webkit-scrollbar{display:none;}
</style>
</head>

function focus(el){
    if(focused) focused.classList.remove('tv-focus');
    focused = el;
    if(el) {
        el.classList.add('tv-focus');
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });

    var ids = modal ? POOLS.modal : (POOLS[page] || []);
    return ids.map($).filter(function(e){ return e && e.offsetParent !== null; });

    var cols = (page === 'home') ? 7 : 4;
    var nextIdx = idx;
    if(dir==='left') nextIdx = Math.max(0, idx - 1);
    if(dir==='right') nextIdx = Math.min(p.length - 1, idx + 1);
    if(dir==='up') nextIdx = Math.max(0, idx - cols);
    if(dir==='down') nextIdx = Math.min(p.length - 1, idx + cols);
    focus(p[nextIdx]);
}

function dispatch(el){
    var a = el.getAttribute('data-act');
    if(!a) return;
    
    if(a.startsWith('page:')) goPage(a.split(':')[1]);
    if(a.startsWith('stream:')) openModal(a.split(':')[1]);
    if(a.startsWith('stream-url:')) launchPlayer(a.split(':')[1]); // DIRECT STREAM
    if(a === 'stream-confirm') confirmAppLaunch();
    if(a === 'stream-cancel') closeModal();
}

function goPage(name){
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    $('page-'+name).classList.add('active');
    page = name;
    modal = false;
    setTimeout(() => focus(pool()[0]), 100);
}

function openModal(svc){
    currentStream = svc;
    $('mTitle').textContent = svc.toUpperCase();
    $('mLogo').textContent = (svc === 'youtube') ? '▶' : 'N';
    $('mLogo').style.color = (svc === 'youtube') ? '#ff0000' : '#e50914';
    $('streamModal').classList.add('active');
    modal = true;
    setTimeout(() => focus($('s-ok')), 100);
}

function closeModal(){
    $('streamModal').classList.remove('active');
    modal = false;
    focus(pool()[0]);
}

// FUNGSI STREAMING LANGSUNG (M3U8)
function launchPlayer(url){
    console.log("Streaming URL: " + url);
    // Di LG Procentric, cara paling umum memutar M3U8 adalah mengalihkan window ke URL stream
    // Sistem TV akan otomatis mendeteksi format M3U8 dan membuka internal player
    window.location.href = url;
}

// FUNGSI LAUNCH APP (YOUTUBE/NETFLIX)
function confirmAppLaunch(){
    var appId = (currentStream === 'youtube') ? 'com.webos.app.youtube' : 'netflix';
    closeModal();
    if(typeof webOS !== 'undefined' && webOS.service) {
        webOS.service.request('luna://com.webos.applicationManager', {
            method: 'launch',
            parameters: { id: appId },
            onFailure: function() { window.location.href = 'sssp://' + currentStream; }
        });
    } else { window.location.href = 'https://www.' + currentStream + '.com'; }
}

function onKey(e){
    var k = e.keyCode;
    if(k===37) navigate('left');
    if(k===39) navigate('right');
    if(k===38) navigate('up');
    if(k===40) navigate('down');
    if(k===13) dispatch(focused);
    if(k===461 || k===8) { 
        if(modal) closeModal(); 
        else if(page!=='home') goPage('home'); 
    }
    e.preventDefault();
}
window.onkeydown = onKey;

function tick(){
    var n = new Date();
    var ts = n.getHours().toString().padStart(2,'0') + ":" + n.getMinutes().toString().padStart(2,'0');
    $('T0').textContent = ts;
}
setInterval(tick, 10000); tick();

window.onload = () => { setTimeout(() => { $('loading').classList.add('gone'); goPage('home'); }, 2200); };
})();
</script>
</body>
