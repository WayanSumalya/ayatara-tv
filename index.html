<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080, initial-scale=1.0">
    <title>Ayatara Resort IPTV Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #c5a059;
            --dark-overlay: rgba(0, 0, 0, 0.6);
            --focus-scale: 1.1;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Poppins', sans-serif;
            color: #fff;
        }

        /* Background dengan efek debu emas (Particle Overlay) */
        .bg-container {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('https://ayatararesort.com/wp-content/uploads/2024/01/hero-bg.jpg') no-repeat center center;
            background-size: cover;
            z-index: -1;
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.2) 100%);
        }

        .content {
            padding: 80px 100px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            height: 80%;
        }

        .logo {
            width: 250px;
            margin-bottom: 20px;
        }

        .welcome-text h1 {
            font-family: 'Playfair Display', serif;
            font-size: 64px;
            margin: 0;
            color: var(--gold);
        }

        .welcome-text p {
            font-size: 24px;
            margin-bottom: 50px;
            opacity: 0.8;
        }

        /* Navigation Grid */
        .menu-container {
            display: flex;
            gap: 25px;
        }

        .menu-item {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid transparent;
            width: 200px;
            height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: white;
        }

        .menu-item i {
            font-size: 40px;
            margin-bottom: 15px;
            color: var(--gold);
        }

        .menu-item span {
            font-size: 18px;
            font-weight: 400;
        }

        /* State saat Remote Fokus */
        .menu-item:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(197, 160, 89, 0.2);
            transform: scale(var(--focus-scale));
            box-shadow: 0 0 30px rgba(197, 160, 89, 0.5);
        }

        /* Animasi Debu Emas Sederhana */
        @keyframes dustMove {
            0% { transform: translateY(0); opacity: 0.3; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-20px); opacity: 0.3; }
        }

        .particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            animation: dustMove 5s infinite alternate;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="bg-container">
        <div class="overlay"></div>
        <div class="particles"></div>
    </div>

    <div class="content">
        <div class="welcome-text">
            <h1>Welcome to Ayatara</h1>
            <p>Experience the soul of luxury in every detail.</p>
        </div>

        <nav class="menu-container">
            <a href="hotel-info.html" class="menu-item" tabindex="1">
                <i class="fas fa-hotel"></i>
                <span>Hotel Info</span>
            </a>
            <a href="rooms.html" class="menu-item" tabindex="2">
                <i class="fas fa-bed"></i>
                <span>Rooms</span>
            </a>
            <a href="dining.html" class="menu-item" tabindex="3">
                <i class="fas fa-utensils"></i>
                <span>Dining</span>
            </a>
            <a href="livetv.html" class="menu-item" tabindex="4">
                <i class="fas fa-tv"></i>
                <span>Live TV</span>
            </a>
            <a href="https://www.youtube.com" class="menu-item" tabindex="5">
                <i class="fab fa-youtube"></i>
                <span>YouTube</span>
            </a>
            <a href="https://www.netflix.com" class="menu-item" tabindex="6">
                <i class="fas fa-film"></i>
                <span>Netflix</span>
            </a>
        </nav>
    </div>

    <script>
        // Logika Remote Control (LG Magic Remote / Standard Remote)
        document.addEventListener('keydown', function(e) {
            const current = document.activeElement;
            const items = document.querySelectorAll('.menu-item');
            let index = Array.from(items).indexOf(current);

            switch(e.keyCode) {
                case 37: // Left
                    if (index > 0) items[index - 1].focus();
                    break;
                case 39: // Right
                    if (index < items.length - 1) items[index + 1].focus();
                    break;
                case 13: // OK / Enter
                    current.click();
                    break;
            }
        });

        // Set fokus awal ke menu pertama saat halaman dimuat
        window.onload = () => {
            document.querySelector('.menu-item').focus();
        };
    </script>
</body>
</html>
