<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080, initial-scale=1.0">
    <title>Ayatara Resort IPTV</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #c5a059;
            --glass: rgba(0, 0, 0, 0.75);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        .main-bg {
            position: absolute;
            width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), 
                        url('https://ayatararesort.com/wp-content/uploads/2024/01/hero-bg.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding-top: 50px;
        }

        .logo-text {
            font-size: 70px;
            letter-spacing: 15px;
            color: var(--gold);
            margin: 0;
            font-weight: 300;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 20px;
            letter-spacing: 5px;
            margin-bottom: 50px;
            opacity: 0.8;
        }

        /* Layout Grid 3 Kolom untuk Menu */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            padding: 20px;
        }

        .nav-box {
            background: var(--glass);
            border: 2px solid rgba(197, 160, 89, 0.3);
            width: 200px;
            height: 160px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease-in-out;
            box-sizing: border-box;
        }

        .nav-box i {
            font-size: 50px;
            margin-bottom: 15px;
            color: var(--gold);
            transition: color 0.2s;
        }

        .nav-box span {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            color: white;
            transition: color 0.2s;
        }

        /* EFEK KETIKA REMOTE MEMILIH MENU (Class .active) */
        .nav-box.active {
            background: var(--gold);
            transform: scale(1.15);
            border-color: #fff;
            box-shadow: 0 0 35px rgba(197, 160, 89, 0.8);
            z-index: 10;
        }

        .nav-box.active i, .nav-box.active span {
            color: #000;
        }
    </style>
</head>
<body>

    <div class="main-bg"></div>

    <div class="container">
        <h1 class="logo-text">AYATARA</h1>
        <div class="subtitle">RESORT & SPA</div>

        <div class="menu-grid">
            <div class="nav-box" data-url="hotel-info.html">
                <i class="fas fa-info-circle"></i>
                <span>Hotel Info</span>
            </div>
            <div class="nav-box" data-url="rooms.html">
                <i class="fas fa-bed"></i>
                <span>Rooms</span>
            </div>
            <div class="nav-box" data-url="dining.html">
                <i class="fas fa-utensils"></i>
                <span>Dining</span>
            </div>
            <div class="nav-box" data-url="livetv.html">
                <i class="fas fa-tv"></i>
                <span>Live TV</span>
            </div>
            <div class="nav-box" data-url="https://www.youtube.com/tv">
                <i class="fab fa-youtube"></i>
                <span>YouTube</span>
            </div>
            <div class="nav-box" data-url="https://www.netflix.com">
                <i class="fas fa-film"></i>
                <span>Netflix</span>
            </div>
        </div>
    </div>

    <script>
        // Logika Remote Control Khusus TV
        const items = document.querySelectorAll('.nav-box');
        let currentIndex = 0;
        const columns = 3; // Karena kita pakai 3 kolom

        function updateFocus(newIndex) {
            // Hapus efek dari menu sebelumnya
            items[currentIndex].classList.remove('active');
            
            // Pindah ke menu baru
            currentIndex = newIndex;
            
            // Berikan efek ke menu baru
            items[currentIndex].classList.add('active');
        }

        document.addEventListener('keydown', function(e) {
            switch(e.keyCode) {
                case 37: // Panah KIRI
                    if (currentIndex % columns !== 0) {
                        updateFocus(currentIndex - 1);
                    }
                    break;
                case 39: // Panah KANAN
                    if ((currentIndex + 1) % columns !== 0 && currentIndex < items.length - 1) {
                        updateFocus(currentIndex + 1);
                    }
                    break;
                case 38: // Panah ATAS
                    if (currentIndex >= columns) {
                        updateFocus(currentIndex - columns);
                    }
                    break;
                case 40: // Panah BAWAH
                    if (currentIndex + columns < items.length) {
                        updateFocus(currentIndex + columns);
                    }
                    break;
                case 13: // Tombol OK / ENTER
                    const targetUrl = items[currentIndex].getAttribute('data-url');
                    // Jika URL valid, alihkan halaman
                    if(targetUrl) {
                        window.location.href = targetUrl;
                    }
                    break;
            }
        });

        // Pastikan menu pertama langsung terpilih (fokus) saat halaman selesai dimuat
        window.onload = function() {
            items[0].classList.add('active');
        };
    </script>
</body>
</html>
