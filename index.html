<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ayatara TV Remote Test</title>

<style>
body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: Arial;
    overflow: hidden;
}

.container {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    padding: 40px;
}

.btn {
    background: #222;
    padding: 50px;
    text-align: center;
    border-radius: 12px;
    font-size: 22px;
    transition: 0.2s;
}

.btn.active {
    background: #00c853;
    transform: scale(1.1);
}

.debug {
    position: fixed;
    bottom: 10px;
    left: 10px;
    color: lime;
}
</style>
</head>

<body tabindex="0">

<div class="container">
    <div class="btn active">Home</div>
    <div class="btn">TV Channel</div>
    <div class="btn">Movies</div>
    <div class="btn">Room Service</div>
    <div class="btn">Tour</div>
    <div class="btn">Info</div>
    <div class="btn">Settings</div>
    <div class="btn">Exit</div>
</div>

<div class="debug" id="debug">Key: -</div>

<script>
let buttons = document.querySelectorAll('.btn');
let index = 0;

// 🔥 FORCE FOCUS (WAJIB untuk Pro:Centric)
function forceFocus() {
    document.body.focus();
    window.focus();
}
setInterval(forceFocus, 1000);
window.onload = forceFocus;

// Update UI focus
function update() {
    buttons.forEach(b => b.classList.remove('active'));
    buttons[index].classList.add('active');
}

// 🔥 REMOTE HANDLER (STABIL LG)
document.onkeydown = function(e) {

    let key = e.keyCode;
    document.getElementById("debug").innerText = "Key: " + key;

    switch(key) {

        case 37: // LEFT
            if(index % 4 !== 0) index--;
            break;

        case 38: // UP
            if(index - 4 >= 0) index -= 4;
            break;

        case 39: // RIGHT
            if(index % 4 !== 3) index++;
            break;

        case 40: // DOWN
            if(index + 4 < buttons.length) index += 4;
            break;

        case 13: // OK
            alert("SELECT: " + buttons[index].innerText);
            break;

        case 461: // BACK
            alert("BACK PRESSED");
            break;
    }

    update();
};

// Init
update();
</script>

</body>
</html>
