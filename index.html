<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, height=720, user-scalable=no">
    <title>Ayatara HD Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root { --gold: #d4af37; --glass: rgba(0,0,0,0.7); }
        body, html { 
            margin: 0; padding: 0; width: 1280px; height: 720px; 
            overflow: hidden; background: #000; font-family: sans-serif; color: #fff;
        }

        /* Background & Slides */
        #bg-slider { position: absolute; width: 100%; height: 100%; z-index: 1; }
        .promo-slide { position: absolute; width: 100%; height: 100%; opacity: 0; visibility: hidden; background: #000; }
        .promo-slide.active { opacity: 1; visibility: visible; }
        .promo-img { width: 100%; height: 100%; object-fit: cover; }
        .overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(90deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.3) 100%); z-index: 2; 
        }

        /* Header */
        header { position: absolute; top: 30px; left: 50px; right: 50px; display: flex; justify-content: space-between; z-index: 10; }
        .guest-info h1 { font-size: 32px; margin: 0; font-weight: 300; }
        .guest-info span { color: var(--gold); font-weight: 700; }
        #clock { font-size: 48px; font-weight: 700; line-height: 1; }

        /* Navigasi (DIPERBAIKI) */
        .nav-dock {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; padding: 10px 30px;
            background: var(--glass); border-radius: 40px; z-index: 20;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; width: 90px;
            opacity: 0.4; transition: 0.3s;
        }
        .nav-item.focused { opacity: 1; transform: scale(1.1); }
        .icon-box { width: 40px; height: 40px; background-size: contain; background-repeat: no-repeat; margin-bottom: 5px; }
        .nav-item span { font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .focused span { color: var(--gold); }

        /* Promo Text */
        .promo-content { position: absolute; bottom: 160px; left: 50px; z-index: 10; }
        .promo-title { font-size: 48px; margin: 0; font-weight: 800; }

        /* Ikon High Res (Base64 agar tidak pecah & cepat load) */
        .ic-netflix { background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCI+PHBhdGggZD0iTTE4LjMgMi42SDE5LjVWMjIuNkgxOC4zTDEyLjYgMTAuNEw3LjcgMjIuNkg1LjdWMi42SDYuOUw5LjggOC44TDE4LjMgMi42WiIgZmlsbD0iI0UxMDYxMyIvPjwvc3ZnPg=='); }
        .ic-youtube { background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCI+PHBhdGggZD0iTTIzLjQ5OCA2LjE4NmMtLjI3Mi0xLjAyMi0xLjA3NC0xLjgyNC0yLjA5Ni0yLjA5NkMxOC41NiA0IDEyIDQgMTIgNHMtNi41NiAwLTkuNDAyLjA5QzEuNTc2IDQuMzYyLjI3IDYuMTg2IDAgOC4yODMgMCAxMiAwIDE1LjcxNy4yIDguMjgzYzAgMTIuODggMCAxOC4yMDctMS4wOTYgMi4wOTYtMi4wOTYgMi44MzhMMTIgMjBzOS40MDItLjA5IDkuNDAyLS4wOUMxOS41NzcgMTUuNjc4IDE5LjE2OCAxNC4xOTggMTguOTY1IDEyLjUyNSAxOC45NjUgMTAuODQ3IDE5LjAxNSA4LjU3MSAxOC44MzEgNi4xODZaTTEwIDE0LjVWOS41TDE0LjUgMTJMMTAgMTQuNVoiIGZpbGw9IiNmZjAwMDAiLz48L3N2Zz4='); }
        .ic-mirror { background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCI+PHBhdGggZmlsbD0iI2ZmZiIgZD0iTTIxIDNIM2MtMS4xIDAtMiAuOS0yIDJ2MTJjMCAxLjEuOSAyIDIgMmg0djJoOHYtMmg0YzEuMSAwIDItLjkgMi0yVjVjMC0xLjEtLjktMi0yLTJ6bTAgMTRIM1Y1aDE4djEyek03IDguNWw3IDMuNS03IDMuNXYtN3oiLz48L3N2Zz4='); }
        .ic-dining { background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCI+PHBhdGggZmlsbD0iI2ZmZiIgZD0iTTExIDlIMXYyZDEwIDAgMCAxIDAgMloiLz48cGF0aCBmaWxsPSIjZmZmIiBkPSJNMTggNXYxNmgtMnYtMTZoLTJ2LTE2aDZWNXoiLz48L3N2Zz4='); }
    </style>
</head>
<body onload="initPortal()">
    <div id="bg-slider">
        <div class="promo-slide active" data-title="OCEAN DINING">
            <img src="https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&w=1280&q=60" class="promo-img">
        </div>
        <div class="promo-slide" data-title="SPA LUXURY">
            <img src="https://images.unsplash.com/photo-1544161515-4af6b1d462c2?auto=format&fit=crop&w=1280&q=60" class="promo-img">
        </div>
    </div>
    <div class="overlay"></div>

    <header>
        <div class="guest-info"><h1>Welcome, <span>Mr. Sumalya</span></h1></div>
        <div id="clock">00:00</div>
    </header>

    <div class="promo-content"><h2 class="promo-title" id="p-title">OCEAN DINING</h2></div>

    <nav class="nav-dock">
        <div class="nav-item focused" data-id="0">
            <div class="icon-box ic-netflix"></div><span>Netflix</span>
        </div>
        <div class="nav-item" data-id="1">
            <div class="icon-box ic-youtube"></div><span>YouTube</span>
        </div>
        <div class="nav-item" data-id="2">
            <div class="icon-box ic-mirror"></div><span>Mirroring</span>
        </div>
        <div class="nav-item" data-id="3">
            <div class="icon-box ic-dining"></div><span>Dining</span>
        </div>
    </nav>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
        }
        setInterval(updateClock, 1000); updateClock();

        // Fix Navigation
        let items = document.querySelectorAll('.nav-item');
        let index = 0;

        function move(dir) {
            items[index].classList.remove('focused');
            index = (index + dir + items.length) % items.length;
            items[index].classList.add('focused');
        }

        // Event Listener Remote TV
        window.addEventListener('keydown', (e) => {
            if(e.keyCode == 37) move(-1); // Left
            if(e.keyCode == 39) move(1);  // Right
            if(e.keyCode == 13) alert('Opening ' + items[index].innerText); // OK
        });

        // Auto Slider
        let slides = document.querySelectorAll('.promo-slide');
        let sIdx = 0;
        setInterval(() => {
            let next = (sIdx + 1) % slides.length;
            gsap.to(slides[sIdx], {opacity:0, duration:1});
            gsap.to(slides[next], {opacity:1, visibility:'visible', duration:1});
            document.getElementById('p-title').innerText = slides[next].dataset.title;
            sIdx = next;
        }, 8000);

        function initPortal() { window.focus(); }
    </script>
</body>
</html>
