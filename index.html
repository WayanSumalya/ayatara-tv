<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, initial-scale=1.0">
    <title>Ayatara Resort — In-Room Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Cinzel:wght@400;500;600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <script src="webOS.js"></script>
    <style>
        :root {
            --bg-deep: #080f0d;
            --bg-mid: #0e1c18;
            --bg-card: #132219;
            --bg-card-hover: #1c3028;
            --gold: #c9a96e;
            --gold-light: #e8cfa0;
            --gold-dark: #8a6d3b;
            --cream: #f2ece0;
            --cream-muted: #b8a98a;
            --border: rgba(201,169,110,0.25);
            --border-focus: #c9a96e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 1920px; height: 1080px; overflow: hidden; background: var(--bg-deep); font-family: 'Lato', sans-serif; color: var(--cream); }

        /* Page Transitions */
        .page { display: none; position: absolute; inset: 0; animation: fadeIn .45s ease both; flex-direction: column; }
        .page.active { display: flex; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }

        /* Shared Header */
        .header { display: flex; align-items: center; justify-content: space-between; padding: 40px 80px; background: linear-gradient(180deg, rgba(8,15,13,1) 0%, rgba(8,15,13,0) 100%); }
        .logo-name { font-family: 'Cinzel', serif; font-size: 32px; letter-spacing: 8px; color: var(--gold-light); }
        .logo-sub { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 16px; color: var(--cream-muted); letter-spacing: 4px; }
        .header-time { font-family: 'Cinzel', serif; font-size: 48px; color: var(--gold-light); text-align: center; }

        /* Grid Layout (7 Columns) */
        .menu-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 20px; padding: 40px 80px; flex: 1; }
        
        .menu-card { 
            background: var(--bg-card); 
            border: 1px solid var(--border); 
            padding: 40px 20px; 
            text-align: center; 
            transition: all 0.3s; 
            outline: none; 
            border-radius: 4px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* KHUSUS: Efek Focus Remote */
        .menu-card:focus {
            background: var(--bg-card-hover);
            border-color: var(--gold);
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 20px rgba(201,169,110,0.3);
        }
        
        .card-label { font-family: 'Cinzel', serif; font-size: 14px; letter-spacing: 2px; margin-top: 20px; text-transform: uppercase; }

        /* Loading Screen */
        #loading { position: fixed; inset: 0; background: var(--bg-deep); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.8s; }
        #loading.hide { opacity: 0; pointer-events: none; }

        /* Modal */
        .stream-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .stream-modal.active { display: flex; }
        .stream-box { background: var(--bg-card); padding: 60px; border: 1px solid var(--gold); text-align: center; border-radius: 8px; }
        .stream-btn { padding: 15px 40px; margin: 10px; border: 1px solid var(--gold); background: none; color: white; cursor: pointer; font-family: 'Cinzel'; }
        .stream-btn:focus { background: var(--gold); color: black; }
    </style>
</head>
<body>

<div id="loading">
    <div style="font-family: 'Cinzel'; font-size: 60px; color: var(--gold);">AYATARA</div>
    <div style="letter-spacing: 10px; color: var(--cream-muted);">RESORT & SPA</div>
</div>

<div id="page-home" class="page active">
    <header class="header">
        <div class="logo-wrap">
            <div class="logo-name">AYATARA</div>
            <div class="logo-sub">Experience Serenity</div>
        </div>
        <div class="header-center">
            <div id="hTime" class="header-time">00:00</div>
            <div id="hDate" style="color: var(--cream-muted); font-size: 18px;">Wednesday, 1 April 2026</div>
        </div>
        <div class="header-right" style="text-align: right;">
            <div style="font-size: 12px; color: var(--cream-muted);">SUITE</div>
            <div style="font-family: 'Cinzel'; font-size: 24px; color: var(--gold-light);">612</div>
        </div>
    </header>

    <div class="menu-grid">
        <div class="menu-card focusable" tabindex="1" onclick="showPage('info')">
            <div class="card-label">Hotel Info</div>
        </div>
        <div class="menu-card focusable" tabindex="2" onclick="showPage('dining')">
            <div class="card-label">Dining</div>
        </div>
        <div class="menu-card focusable" tabindex="3" onclick="showPage('wellness')">
            <div class="card-label">Wellness</div>
        </div>
        <div class="menu-card focusable" tabindex="4" onclick="showPage('facilities')">
            <div class="card-label">Facilities</div>
        </div>
        <div class="menu-card focusable" tabindex="5" onclick="openStream('youtube')">
            <div class="card-label" style="color: #ff0000;">YouTube</div>
        </div>
        <div class="menu-card focusable" tabindex="6" onclick="openStream('netflix')">
            <div class="card-label" style="color: #e50914;">Netflix</div>
        </div>
        <div class="menu-card focusable" tabindex="7" onclick="showPage('livetv')">
            <div class="card-label">Live TV</div>
        </div>
    </div>
</div>

<div id="streamModal" class="stream-modal">
    <div class="stream-box">
        <h2 id="streamTitle" style="font-family: 'Cinzel'; margin-bottom: 20px;">LAUNCH APP</h2>
        <p id="streamMsg" style="margin-bottom: 40px;">Do you want to open this application?</p>
        <button class="stream-btn focusable" tabindex="10" id="btnConfirm" onclick="confirmStream()">YES, OPEN</button>
        <button class="stream-btn focusable" tabindex="11" onclick="closeStream()">CANCEL</button>
    </div>
</div>

<script>
    // 1. UPDATE CLOCK
    function updateClock() {
        const now = new Date();
        const time = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        document.getElementById('hTime').innerText = time;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 2. LOADING HANDLING
    window.onload = () => {
        setTimeout(() => {
            document.getElementById('loading').classList.add('hide');
            document.querySelector('.menu-card').focus(); // Auto focus pertama
        }, 2000);
    };

    // 3. NAVIGATION LOGIC
    function showPage(id) {
        console.log("Navigating to: " + id);
        // Tambahkan logika perpindahan halaman Bli di sini jika ada sub-page
        alert("Navigating to " + id + ". Add your sub-page content here.");
    }

    // 4. STREAMING APP LAUNCHER
    let selectedApp = "";
    function openStream(app) {
        selectedApp = app;
        document.getElementById('streamTitle').innerText = app.toUpperCase();
        document.getElementById('streamModal').classList.add('active');
        document.getElementById('btnConfirm').focus();
    }

    function closeStream() {
        document.getElementById('streamModal').classList.remove('active');
        document.querySelector('.menu-card').focus();
    }

    function confirmStream() {
        const appId = (selectedApp === 'youtube') ? 'youtube.leanback.v4' : 'netflix';
        console.log("Launching: " + appId);
        
        if (window.webOS && window.webOS.service) {
            window.webOS.service.request("luna://com.webos.applicationManager", {
                method: "launch",
                parameters: { "id": appId },
                onSuccess: (res) => console.log("Success"),
                onFailure: (err) => alert("Failed to launch " + selectedApp)
            });
        } else {
            alert("App launching is only available on LG TV.");
        }
        closeStream();
    }

    // 5. MASTER REMOTE CONTROL HANDLER
    document.addEventListener('keydown', function(e) {
        const active = document.activeElement;
        
        // LG Magic Remote / D-Pad Keys
        switch(e.keyCode) {
            case 37: // Left
                if (active.previousElementSibling && active.previousElementSibling.classList.contains('focusable')) {
                    active.previousElementSibling.focus();
                }
                break;
            case 39: // Right
                if (active.nextElementSibling && active.nextElementSibling.classList.contains('focusable')) {
                    active.nextElementSibling.focus();
                }
                break;
            case 13: // Enter / OK
                active.click();
                break;
            case 461: // Back Button LG
                if (document.getElementById('streamModal').classList.contains('active')) {
                    closeStream();
                } else {
                    // Logic untuk kembali ke Home jika sedang di sub-page
                }
                break;
        }
    });
</script>

</body>
</html>
